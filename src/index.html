<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Rift Deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <header class="app-header">
    <h1 class="app-title"><span class="title-super">Super</span> <span class="title-rift">Rift</span> <span class="title-deck">Deck</span></h1>
    <p class="app-subtitle">A Riftbound Deckbuilder</p>
  </header>
  <main class="app-layout">
    <section class="card-browser">
      <div id="filters" class="filters-bar"></div>
      <div class="view-toggle-bar">
        <button id="view-card" class="view-toggle-btn active">Card View</button>
        <button id="view-deck" class="view-toggle-btn">Deck View</button>
        <button id="view-details" class="view-toggle-btn">Deck Details</button>
        <button id="view-hand" class="view-toggle-btn">Hand Simulator</button>
      </div>
      <div id="card-grid" class="card-grid"></div>
      <div id="deck-grid" class="card-grid hidden"></div>
      <div id="deck-details" class="deck-details hidden"></div>
      <div id="hand-simulator" class="hand-simulator hidden"></div>
      <div id="deck-hover-preview" class="deck-hover-preview hidden">
        <img id="deck-hover-preview-img" src="" alt="Card preview" />
      </div>
    </section>
    <button id="deck-toggle" class="deck-toggle" title="Toggle deck panel" aria-label="Toggle deck panel">▶</button>
    <aside id="deck-panel" class="deck-panel"></aside>
  </main>

  <footer class="app-footer">
    Powered by <a href="https://riftcodex.com/" target="_blank" rel="noopener noreferrer">RIFTCODEX</a>
    ·
    <a href="https://github.com/bthomas2622/super-rift-deck" target="_blank" rel="noopener noreferrer">GitHub Repo</a>
    ·
    <span class="contribute-wrapper">
      <button id="contribute-btn" class="contribute-btn">Contribute</button>
      <div id="contribute-popup" class="contribute-popup hidden">
        <a href="https://github.com/bthomas2622/super-rift-deck/issues/new?template=feedback.yml" target="_blank" rel="noopener noreferrer">Submit Feedback</a>
        <a href="https://github.com/bthomas2622/super-rift-deck/issues/new?template=bug_report.yml" target="_blank" rel="noopener noreferrer">Report Bug</a>
        <a href="https://github.com/bthomas2622/super-rift-deck/blob/main/CONTRIBUTING.md" target="_blank" rel="noopener noreferrer">Contribute Code</a>
      </div>
    </span>
  </footer>

  <!-- Card preview overlay -->
  <div id="card-preview" class="card-preview hidden">
    <img id="card-preview-img" src="" alt="Card preview" />
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
