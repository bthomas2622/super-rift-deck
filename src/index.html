<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Rift Deck</title>
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <header class="app-header">
    <h1 class="app-title"><span class="title-super">Super</span> <span class="title-rift">Rift</span> <span class="title-deck">Deck</span></h1>
    <p class="app-subtitle">A Riftbound Deckbuilder</p>
  </header>
  <main class="app-layout">
    <section class="card-browser">
      <div id="filters" class="filters-bar"></div>
      <div class="view-toggle-bar">
        <button id="view-card" class="view-toggle-btn active">Card View</button>
        <button id="view-details" class="view-toggle-btn">Deck Details</button>
      </div>
      <div id="card-grid" class="card-grid"></div>
      <div id="deck-details" class="deck-details hidden"></div>
    </section>
    <aside id="deck-panel" class="deck-panel"></aside>
  </main>

  <!-- Card preview overlay -->
  <div id="card-preview" class="card-preview hidden">
    <img id="card-preview-img" src="" alt="Card preview" />
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
