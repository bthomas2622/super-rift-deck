name: Update Banned Cards

on:
  schedule:
    - cron: '30 3 * * *' # Nightly at 3:30 AM UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  copilot-requests: write

jobs:
  update-banned:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Copilot CLI
        uses: actions/setup-copilot@v0

      - name: Extract banned cards with Copilot CLI
        run: |
          copilot -p "Fetch the webpage at https://riftbound.leagueoflegends.com/en-us/rules-hub/ and find the section about Constructed Format Legality. Extract ALL card names and battlefield names that are banned from play in sanctioned Constructed tournaments. Write a JSON file called banned-raw.json containing a JSON array of strings with just the card/battlefield names. Do not include any other text in the file." --allow-tool='shell(curl:*)' --allow-tool=write --no-ask-user

      - name: Match and update banned cards
        run: node scripts/update-banned.mjs

      - name: Clean up
        run: rm -f banned-raw.json

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/components/filters.js && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/components/filters.js
          git commit -m "chore: update banned cards list from rules hub"
          git push
