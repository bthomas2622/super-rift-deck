name: Feedback / Feature Request
description: Share feedback, suggest a feature, or propose an improvement
title: "[Feedback]: "
labels: ["feedback"]
body:
  - type: markdown
    attributes:
      value: |
        We'd love to hear your ideas! Whether it's a feature request, UX suggestion, or general feedback — let us know.

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Feature request
        - UI / UX improvement
        - General feedback
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe your idea or feedback in detail.
      placeholder: I'd like to see...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why would this be useful?
      description: Explain why this change would improve the deckbuilder.
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or mockups
      description: If applicable, add images to help illustrate your idea.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other details.
    validations:
      required: false
